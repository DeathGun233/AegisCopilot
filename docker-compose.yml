services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegiscopilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      AEGIS_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/aegiscopilot
      AEGIS_VECTOR_STORE_PROVIDER: ${AEGIS_VECTOR_STORE_PROVIDER:-milvus}
      AEGIS_MILVUS_URI: ${AEGIS_MILVUS_URI:-http://milvus:19530}
      AEGIS_MILVUS_COLLECTION: ${AEGIS_MILVUS_COLLECTION:-aegis_chunks}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - milvus

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - milvus-etcd-data:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - milvus-minio-data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.6.14
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - milvus-minio

volumes:
  postgres-data:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
